# fly.toml app configuration file generated for ribbit-api on 2026-05-15T00:34:48Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'ribbit-api'
primary_region = 'sjc'

[build]

[env]
  API_KEY_DB_PATH = '/var/lib/ribbit/keys.db'

[[mounts]]
  source = 'ribbit_api_data'
  destination = '/var/lib/ribbit'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 1

[[vm]]
  size = 'shared-cpu-1x'
  memory = '256mb'
